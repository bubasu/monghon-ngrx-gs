<!-- Der Picker Container -->
<div
  class="relative flex items-center w-64 h-16 bg-gray-100 rounded-lg overflow-hidden border-2 border-blue-500"
>
  <!-- Markierung in der Mitte -->
  <div class="absolute inset-0 flex justify-center pointer-events-none">
    <div class="w-12 h-full bg-blue-200 opacity-30 border-l border-r border-blue-400"></div>
  </div>

  <!-- Scrollbarer Bereich -->
  <div
    #scrollContainer
    (scroll)="onScroll($event)"
    class="flex overflow-x-auto snap-x snap-mandatory scrollbar-hide h-full items-center px-[104px]"
    style="scrollbar-width: none; -ms-overflow-style: none;"
  >
    @for (char of options(); track char; let i = $index) {
      <div
        (click)="scrollToOption(i)"
        class="shrink-0 w-12 h-12 flex items-center justify-center text-2xl font-mono snap-center transition-transform cursor-pointer"
        [class.text-blue-600]="pick() === char"
        [class.scale-125]="pick() === char"
        [class.font-bold]="pick() === char"
      >
        {{ char }}
      </div>
    }
  </div>
</div>
