<!-- The picker container -->
<div
  class="relative flex items-center w-48 h-12 bg-transparent rounded-lg overflow-hidden border-2 border-pencil-color pencil-border-subtle"
>
  <!-- Marker in the center -->
  <div class="absolute inset-0 flex justify-center pointer-events-none">
    <div class="w-10 h-full border-l border-r border-gray-300 opacity-50"></div>
  </div>

  <!-- Scrollable area -->
  <div
    #scrollContainer
    (scroll)="onScroll($event)"
    class="flex overflow-x-auto snap-x snap-mandatory scrollbar-hide h-full items-center px-[76px]"
    style="scrollbar-width: none; -ms-overflow-style: none"
  >
    @for (char of displayOptions(); track $index; let i = $index) {
      <div
        (click)="onItemClick(i)"
        class="shrink-0 w-10 h-10 flex items-center justify-center text-xl font-mono snap-center transition-transform cursor-pointer"
        [class.text-pencil-color]="pick() === char"
        [class.scale-125]="pick() === char"
        [class.font-bold]="pick() === char"
        [class.opacity-40]="pick() !== char"
      >
        {{ char }}
      </div>
    }
  </div>
</div>
