<div
  class="game-container paper-texture pencil-border"
  tabindex="0"
  role="region"
  aria-label="Spielbereich"
  (keydown)="onGameKeydown($event)"
>
  <div class="story-selector">
    <label for="storySelect">Scenario:</label>
    <select id="storySelect" [(ngModel)]="selectedScenario">
      @for (scenario of allScenarios; track scenario) {
        <option [value]="scenario">{{ SCENARIO_LABELS[scenario] }}</option>
      }
    </select>
  </div>

  <div class="illustration-wrapper">
    <app-illustration [scenario]="selectedScenario()" [dynamic]="dynamic()"></app-illustration>
  </div>

  <div class="word-display">
    @for (char of game().guessedWord; track $index) {
      <span class="char-box">{{ char !== '_' ? char : '' }}</span>
    }
  </div>

  <div class="controls">
    <div class="input-row">
      <app-wheel-picker
        [options]="alphabet"
        [circular]="true"
        (optionPicked)="setLetter($event)"
      ></app-wheel-picker>

      <button
        #guessLetterBtn
        id="guessLetterBtn"
        (click)="guessLetter()"
        class="pencil-btn icon-btn"
        title="Buchstaben raten"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="w-6 h-6"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
        </svg>
      </button>
    </div>

    @if (game().phase === 'Won' || game().phase === 'Lost') {
      <button (click)="startNewGame()" class="pencil-btn new-game-btn">New Game</button>
    }
  </div>
</div>
